version: "3.9"
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: deliveria-app
    container_name: ${DOCKER_NAME}_app
    restart: unless-stopped
    working_dir: /deliveria
    environment:
      - MONGO_URL=mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@mongodb:27017/${MONGO_DATABASE}?authSource=admin
      - JWT_KEY=${JWT_KEY}
      - projectId=${projectId}
      - clientEmail=${clientEmail}
      - privateKey=${privateKey}
      - PORT=8550
    expose:
      - "8550"
    depends_on:
      - mongodb
    networks:
      - app-network
    volumes:
      - .:/deliveria
      - /deliveria/node_modules
      - uploads_data:/deliveria/uploads

  webserver:
    image: nginx:alpine
    container_name: ${DOCKER_NAME}_webserver
    restart: unless-stopped
    depends_on:
      app:
        condition: service_started
    networks:
      - app-network
    volumes:
      - .:/var/www:ro
      - ./default.conf:/etc/nginx/conf.d/default.conf
      - uploads_data:/var/www/uploads:ro
    ports:
      - "80"

  mongodb:
    image: mongo:6.0
    container_name: ${DOCKER_NAME}_mongodb
    restart: unless-stopped
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
    volumes:
      - mongodb_data:/data/db
    networks:
      - app-network
    ports:
      - "27017"

volumes:
  mongodb_data:
    name: ${DOCKER_NAME}_mongodb_data
  uploads_data:
    name: ${DOCKER_NAME}_uploads_data

networks:
  app-network:
    name: ${DOCKER_NAME}_network
